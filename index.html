<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BI Catálogo GNSS</title>
    <link rel="icon" type="image/png" href="Imagenes/icono.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="embers" id="embers"></div>

    <div class="login-shell">

        <img class="login-logo" src="Imagenes/unasam.png" alt="Logo UNASAM">

        <div class="login-box">
            <div class="login-glow"></div>
            <span class="login-tag">Business Intelligence</span>
            <h2>BI Catálogo GNSS</h2>
            <p>Iniciar Sesión</p>
            <input
                type="text"
                id="usuario"
                placeholder="Usuario">
            <input
                type="password"
                id="password"
                placeholder="Contraseña">
            <button onclick="ingresar()">
                Ingresar
            </button>
            <p id="mensaje"></p>
        </div>

        <img class="login-logo" src="Imagenes/images.png" alt="Logo Facultad de Ciencias UNASAM">

    </div>

<script src="script.js"></script>
</body>
</html>
