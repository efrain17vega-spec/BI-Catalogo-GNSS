<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - BI Catálogo GNSS</title>
    <link rel="icon" type="image/png" href="Imagenes/icono.png">
    <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">

    <div class="embers" id="embers"></div>

    <div class="login-page">

        <img class="gnss-logo" src="Imagenes/GNSS.PNG" alt="GNSS">

        <div class="login-shell">

            <div class="side-col">
                <img class="login-logo" src="Imagenes/unasam.png" alt="Logo UNASAM">
                <div class="volcan-mini">
                    <img src="Imagenes/ubina.jpg" alt="Volcán Ubinas">
                    <span>Ubinas</span>
                </div>
            </div>

            <div class="login-box">
                <div class="login-glow"></div>
                <span class="login-tag">Business Intelligence</span>
                <h2>BI Catálogo GNSS</h2>
                <p>Iniciar Sesión</p>
                <input
                    type="text"
                    id="usuario"
                    placeholder="Usuario">
                <input
                    type="password"
                    id="password"
                    placeholder="Contraseña">
                <button onclick="ingresar()">
                    Ingresar
                </button>
                <p id="mensaje"></p>
            </div>

            <div class="side-col">
                <img class="login-logo" src="Imagenes/images.png" alt="Logo Facultad de Ciencias UNASAM">
                <div class="volcan-mini">
                    <img src="Imagenes/sabancaya.jpg" alt="Volcán Sabancaya">
                    <span>Sabancaya</span>
                </div>
            </div>

        </div>

    </div>

<script src="script.js"></script>
</body>
</html>
